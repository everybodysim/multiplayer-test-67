<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Colyseus Test (Fixed Debug)</title>

  <style>
    body {
      font-family: monospace;
      background: #111;
      color: #0f0;
      padding: 16px;
    }

    .box {
      border: 1px solid #0f0;
      padding: 10px;
      margin-bottom: 10px;
    }

    .error { color: #ff4d4d; }
    .warn { color: #ffd24d; }
    .ok { color: #66ff99; }

    #log {
      white-space: pre-wrap;
      max-height: 400px;
      overflow: auto;
      border: 1px solid #0f0;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Colyseus Connection Test</h2>

<div class="box">
  <div>Server: <span id="server">...</span></div>
  <div>Status: <span id="status">starting...</span></div>
  <div>Room: <span id="room">-</span></div>
  <div>Session ID: <span id="session">-</span></div>
</div>

<div class="box">
  <b>Event Log</b>
  <div id="log"></div>
</div>

<!-- SAFE UMD BUILD (NO MODULE ISSUES) -->
<script src="https://cdn.jsdelivr.net/npm/colyseus.js@0.15.25/dist/colyseus.js"></script>

<script>
const server = "https://us-sjc-e902b997.colyseus.cloud";

const el = (id) => document.getElementById(id);

function log(msg, cls = "") {
  const div = document.createElement("div");
  div.textContent = msg;
  if (cls) div.className = cls;
  el("log").appendChild(div);
  el("log").scrollTop = el("log").scrollHeight;
}

function setStatus(text, cls = "") {
  el("status").textContent = text;
  el("status").className = cls;
}

el("server").textContent = server;

setStatus("connecting...");

const client = new Colyseus.Client(server);

(async () => {

  let room;

  try {
    log("Step 1: Creating client connection...");

    // -----------------------------
    // MATCHMAKING STEP (SAFE)
    // -----------------------------
    setStatus("matchmaking...");

    try {
      room = await client.joinOrCreate("racing", {
        mapCode: "test"
      });
    } catch (err) {

      setStatus("matchmaking failed ❌", "error");

      log("JOIN ERROR ❌", "error");

      log(
        JSON.stringify(err, Object.getOwnPropertyNames(err), 2),
        "error"
      );

      return;
    }

    // -----------------------------
    // SAFETY CHECK
    // -----------------------------
    if (!room) {
      setStatus("failed ❌", "error");
      log("Room is undefined (server rejected join)", "error");
      return;
    }

    // -----------------------------
    // SUCCESS
    // -----------------------------
    setStatus("connected ✅", "ok");

    el("room").textContent = room.name || "no-name";
    el("session").textContent = room.sessionId || "no-session";

    log("JOINED ROOM SUCCESS ✅", "ok");
    log("Room: " + (room.name || "unknown"), "ok");
    log("Session: " + room.sessionId, "ok");

    // -----------------------------
    // LIVE EVENTS
    // -----------------------------
    room.onStateChange((state) => {
      log("state update");
    });

    room.onMessage("*", (type, message) => {
      log(`message: ${type} → ${JSON.stringify(message)}`);
    });

    room.onError((code, message) => {
      setStatus("room error ❌", "error");
      log(`ERROR ${code}: ${message}`, "error");
    });

    room.onLeave(() => {
      setStatus("disconnected", "warn");
      log("Left room", "warn");
    });

  } catch (e) {
    setStatus("fatal error ❌", "error");
    log("FATAL ERROR:", "error");
    log(String(e), "error");
  }

})();

</script>

</body>
</html>
